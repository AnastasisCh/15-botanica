<section class="about" id="about">
  <div class="container">
    <div class="about-grid" appReveal>

      <!-- Images -->
      <div class="about-visual">
        <div class="about-img about-img-main">
          <img
            src="https://images.unsplash.com/photo-1466637574441-749b8f19452f?w=700&q=80"
            alt="Botanica garden café interior with plants and natural light"
            loading="lazy" />
        </div>
        <div class="about-img about-img-accent">
          <img
            src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400&q=80"
            alt="Matcha latte served with wildflower"
            loading="lazy" />
        </div>
        <div class="about-badge" aria-label="Established 2017">
          <span>Since</span>
          <strong>2017</strong>
        </div>
      </div>

      <!-- Text -->
      <div class="about-text">
        <p class="section-label">{{ lang.t().about.label }}</p>
        <h2 class="section-title">{{ lang.t().about.titlePre }} <em>{{ lang.t().about.titleEm }}</em></h2>

        <p>{{ lang.t().about.p1 }}</p>
        <p>{{ lang.t().about.p2 }}</p>

        <div class="about-stats" role="list" aria-label="Key facts">
          <div class="stat" role="listitem">
            <strong>60+</strong>
            <span>{{ lang.t().about.stat1 }}</span>
          </div>
          <div class="stat" role="listitem">
            <strong>8</strong>
            <span>{{ lang.t().about.stat2 }}</span>
          </div>
          <div class="stat" role="listitem">
            <strong>7</strong>
            <span>{{ lang.t().about.stat3 }}</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
